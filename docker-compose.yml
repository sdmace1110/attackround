services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: dnduser
      POSTGRES_PASSWORD: dndpass
      POSTGRES_DB: dndtracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5173:5173"

volumes:
  postgres_data:
